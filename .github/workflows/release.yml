# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Release bot

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

permissions:
    contents: write
    packages: write

jobs:
    build-release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v4
              with:
                  go-version: "1.25.7"

            - name: Build
              run: |
                  export BUILD_VERSION=${{ github.ref_name }}
                  ./create_binaries.sh

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GitHub Packages
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build Docker image
              run: |
                  export BUILD_VERSION=${{ github.ref_name }}
                  export IMAGE=ghcr.io/${{ github.repository }}

                  cp eventbot.linux-amd64 build/eventbot.linux-amd64
                  cp eventbot.linux-arm64 build/eventbot.linux-arm64
                  cd build

                  docker buildx build \
                      --platform linux/amd64,linux/arm64 \
                      --build-arg VERSION=${VERBUILD_VERSIONSION} \
                      -t ${IMAGE}:${BUILD_VERSION} \
                      -t ${IMAGE}:latest \
                      --push \
                      .

            - name: Create Release
              uses: softprops/action-gh-release@v1
              if: startsWith(github.ref, 'refs/tags/')
              with:
                  tag_name: ${{ github.ref_name }}
                  files: |
                      eventbot.darwin-amd64
                      eventbot.darwin-arm64
                      eventbot.linux-amd64
                      eventbot.linux-arm64
                      eventbot.windows-amd64.exe
